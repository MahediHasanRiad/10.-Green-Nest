components: 
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer 
      bearerFormat: JWT
  schemas: 
    pagination:
      type: object
      properties: 
        page:
          type: number
          format: int32
          example: 1
        limit:
          type: number
          format: int32
          example: 10
        next:
          type: string
          example: pages-name/3
        prev:
          type: string
          example: page-name/1
        total-page:
          type: number
          format: int32
          example: 50
        total-content:
          type: number
          format: int32
          example: 112
    
    userDTO:
      type: object
      properties: 
        id:
          type: string
          example: afdasdf23234hoij35jk34jo2
        name: 
          type: string
          example: Mahedi Hasan Riad
        email:
          type: string
          example: contact.mahedihasan@gmail.com 
        role:
          type: string
          enum: [ 'Admin', 'User', 'Vendor' ]
          default: User 
        status:
          type: string
          enum: ['Pending', 'Accepted', 'Rejected']
          default: Pending
        createdAt:
          type: string
          example: 2024-03-15T08:30:00.000Z
        updatedAt:
          type: string
          example: 2024-03-15T08:30:00.000Z
    vendorDTO:
      type: object
      properties: 
        userId:
          type: string
          example: a8d6f786adf78sdf87a9sdf7
        farm-name:
          type: string
          example: RST Farm 
        farm-Location:
          type: string
          example: Lohagara, Padua
    productDTO:
      type: object
      properties: 
        vendorId:
          type: string
          example: s8df678sd67f8s76df87sd
        name:
          type: string
          example: Tometo 
        description:
          type: string
          example: something about plant 
        price:
          type: number
          format: int32
          example: 100
        category:
          type: string
          enum: ['seeds', 'Tools', 'Rrganic products'] 
          example: seeds
        availableQuantity:
          type: number
          format: int32
          example: 100
        certificationStatus:
          type: string
          enum: ['Pending', 'verified', 'Rejected', 'Expired', 'Not_required']
          default: Pending
    rentalSpaceDTO:
      type: object
      properties: 
        vendorId:
          type: string
          example: s8df678sd67f8s76df87sd
        location:
          type: string
          example: Lohagara 
        size:
          type: string
          example: 5.6M
        price:
          type: number
          format: int32
          example: 100
        availability:
          type: boolean
          example: true
    orderDTO:
      type: object
      properties: 
        userId:
          type: string
          example: users/s8df678sd67f8s76df87sd
        produceId:
          type: string
          example: products/s8df678sd67f8s76df87sd 
        vendorId:
          type: string
          example: vendors/s8df678sd67f8s76df87sd 
        status:
          type: string
          example: Pending
        orderDate:
          type: string
          example: 01-12-2026
    rentDTO:
      type: object
      properties: 
        userId:
          type: string
          example: users/s8df678sd67f8s76df87sd
        rentalSpaceId:
          type: string
          example: products/s8df678sd67f8s76df87sd 
        vendorId:
          type: string
          example: vendors/s8df678sd67f8s76df87sd 
        duration:
          type: string
          example: 01-08-2026 - 01-12-2026
        status:
          type: string
          example: Pending
    plantDTO:
      type: object
      properties: 
        name:
          type: string
          example: Tometo 
        description:
          type: string
          example: something about plant 
        status:
          type: string
          enum: ["healthy", "needs_care", "dead", "unknown"]
          example: healthy
        lastWateredAt:
          type: string
          example: 10pm 
        growthStage:
          type: string
          enum: ["seed", "seedling", "vegetative", "flowering", "harvested"]
          example: seed
        userId:
          type: string
          example: users/8sd76f8s7d6f8s7d6f
        rentalSpaceId:
          type: string
          example: rentalSpaces/8sd76f8s7d6f8s7d6f
  
  parameters:
    idParameter:
      in: path
      name: id 
      description: user / product / rental id 
      schema: 
        type: string
        example: aqosdfrj21234jojikj34o23i
      required: true
    limitParameter:
      in: query
      name: Limit
      description: how many item will show in a page
      schema: 
        type: number
        format: int32
        example: 10
    pageParameter:
      in: query
      name: Page
      description: current page number
      schema:
        type: number
        format: int32
        example: 1
    sortTypeParameter:
      in: query
      name: sortType 
      description: sort by asc or desc 
      schema:
        type: string
        enum: [ asc, desc ]
        example: desc 
    sortByParameter:
      in: query
      name: sortBy
      description: sort by updatedAt or any other field 
      schema:
        type: string
        example: updateAt
    searchParameter:
      in: query
      name: search 
      description: filter by name or location 
      schema:
        type: string
        example: Riad
 
  responses: 
    '204':
       description: empty content
       content: 
        'application/json':
          schema: 
            type: object
            properties: 
              code: 
                type: number
                format: int32
                example: 401
              message:
                type: string
                example: empty content 
    '400':
      description: Bad Request
      content: 
        'application/json':
          schema: 
            type: object
            properties: 
              code:
                type: number
                format: int32
                example: 400
              message:
                type: string
                example: Bad Request
              data:
                type: object
                properties: 
                  message:
                    type: string
                    example: error
                  field:
                    type: string
                    example: field name
                  in:
                    type: string
                    enum: [Query, Body]
                    example: Query 
    '401':
      description: unauthorized
      content: 
        'application/json':
          schema: 
            type: object
            properties: 
              code: 
                type: number
                format: int32
                example: 401
              message:
                type: string
                example: unauthorized
    '404':
      description: not found
      content: 
        'application/json':
          schema: 
            type: object
            properties: 
              code:
                type: number
                format: int32
                example: 404
              message:
                type: string
                example: Content Not found 
    '500':
      description: Server Error 
      content: 
        'application/json':
          schema: 
            type: object
            properties: 
              code: 
                type: number
                format: int32
                example: 500
              message:
                type: string
                example: Server Error
  